    <style>
        * {

        body {

        /* Hiệu ứng ánh sáng nền mờ tạo chiều sâu */
        body::before {

            padding: 40px 32px;
            text-align: center;
            z-index: 1;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.1);

            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px auto;
            color: #ef4444;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            }

            70% {
                box-shadow: 0 0 0 12px rgba(239, 68, 68, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(239, 68, 68, 0);
            }
        }

        .sub-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #9ca3af;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .highlight-scam {
            color: #ef4444;
            position: relative;
            display: inline-block;
            font-weight: 800;
        }

        .highlight-free {
            background: linear-gradient(to right, #34d399, #059669);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .desc {
            font-size: 15px;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .links-group {

            gap: 12px;
        }

        .btn-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: #e5e7eb;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            color: #ffffff;
        }

        .btn-link .arrow {
            transition: transform 0.3s ease;
            opacity: 0.6;
        }

        .btn-link:hover .arrow {
            transform: translateX(4px);
            opacity: 1;
        }

        /* Màu sắc tinh tế riêng cho từng nền tảng khi hover */

            color: #4b5563;
